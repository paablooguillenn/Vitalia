spring:
  application:
    name: vitalia-backend

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/vitalia
    username: vitalia_user
    password: your_secure_database_password_here
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: CHANGE_THIS_TO_A_SECURE_SECRET_KEY_AT_LEAST_256_BITS_LONG_FOR_HS256_ALGORITHM_USE_RANDOM_STRING
  expiration: 86400000 # 24 hours in milliseconds

# Application Configuration
application:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:4200
  file-storage:
    upload-dir: ./uploads

# Logging Configuration
logging:
  level:
    com.vitalia: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
